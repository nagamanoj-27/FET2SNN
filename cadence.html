<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FET2SNN | Workbench v3.0</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/verilog.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #060a14; color: #e2e8f0; }
        
        /* --- STUNNING CSS QUANTUM MESH BACKGROUND (NO 3D, NO CRASHES) --- */
        .bg-mesh {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.8;
            background: #060a14;
        }
        .bg-mesh::before {
            content: '';
            position: absolute; inset: -10%;
            background: radial-gradient(circle at 30% 40%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 70% 60%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
            animation: breatheGlow 6s ease-in-out infinite alternate;
        }
        .bg-mesh::after {
            content: '';
            position: absolute; inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        @keyframes breatheGlow {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        .glass-panel { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); position: relative; z-index: 10; }
        .input-field { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s; width: 100%; border-radius: 10px; padding: 8px 12px; color: white; font-size: 0.9rem; outline: none; }
        .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .neon-btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); transition: 0.3s; }
        .neon-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); }
        .terminal-code { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
        
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
        .neon-btn.loading .spinner { display: inline-block; }
        .neon-btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(16, 185, 129, 0.9); backdrop-filter: blur(8px); padding: 12px 24px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); color: white; font-weight: 500; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 999; opacity: 0; transition: all 0.4s; pointer-events: none; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0px); }
        
        input[type="file"]::file-selector-button { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); color: #60a5fa; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        input[type="file"]::file-selector-button:hover { background: rgba(59, 130, 246, 0.4); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.4); border-radius: 10px; }
        
        .upload-success { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.05) !important; }
    </style>
</head>
<body>
    <!-- Pure CSS 3D Alternative Mesh -->
    <div class="bg-mesh"></div>
    
    <!-- Toast Notification -->
    <div id="toast">✅ Code Synthesized Successfully!</div>

    <div class="relative z-10 container mx-auto p-4 lg:p-8 max-w-7xl min-h-screen flex flex-col gap-6">
        <header class="border-b border-white/5 pb-4 flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-300 to-purple-300 bg-clip-text text-transparent">TCAD-to-Cadence Workbench</h1>
            <span class="text-xs text-blue-300 border border-blue-500/30 bg-blue-900/20 px-3 py-1 rounded-full">v3.0 - Zero-Engine</span>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 flex-grow">
            <!-- LEFT: 12 Inputs & CSV Analyzer -->
            <div class="xl:col-span-5 space-y-6">
                <div class="glass-panel p-5 h-[750px] overflow-y-auto custom-scroll">
                    <div class="text-sm font-medium text-slate-300 mb-4 flex gap-2"><span class="inline-block w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> COMPACT MODEL CONFIG (TAAM)</div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-[10px] text-slate-500 mb-1">Gate Length (nm)</label><input id="pL" type="number" value="16" class="input-field" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">Sheet Width (nm)</label><input id="pW" type="number" value="20" class="input-field" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">Stacked Sheets (N)</label><input id="pN" type="number" value="3" class="input-field" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">Channel Doping (cm⁻³)</label><input id="pDop" type="text" value="1.0e20" class="input-field" /></div>
                        <div class="col-span-2"><label class="block text-[10px] text-slate-500 mb-1">Vth0 (Auto-filled by CSV)</label><input id="pVth" type="number" step="0.001" value="0.35" class="input-field border-l-2 border-l-emerald-500" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">DIBL Coeff (V/V)</label><input id="pDibl" type="number" step="0.01" value="0.08" class="input-field" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">Mobility (cm²/Vs)</label><input id="pU0" type="number" value="200" class="input-field" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">Vsat (cm/s)</label><input id="pVsat" type="text" value="1.0E7" class="input-field" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">CLM (V⁻¹)</label><input id="pClm" type="number" step="0.01" value="0.08" class="input-field" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">Sub Swing (V/dec)</label><input id="pSwing" type="number" step="0.01" value="0.07" class="input-field" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">Rs (Source Ω)</label><input id="pRs" type="number" step="1" value="0" class="input-field" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">Rd (Drain Ω)</label><input id="pRd" type="number" step="1" value="0" class="input-field" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">Rth (K/W) [TAAM]</label><input id="pRth" type="number" step="1" value="80" class="input-field border-l-2 border-l-red-500" /></div>
                        <div><label class="block text-[10px] text-slate-500 mb-1">Tamb (K) [TAAM]</label><input id="pTamb" type="number" step="1" value="300" class="input-field border-l-2 border-l-red-500" /></div>
                    </div>

                    <!-- CSV Uploader -->
                    <div class="mt-6 pt-4 border-t border-white/5">
                        <label class="block text-[10px] text-slate-500 mb-2 uppercase tracking-wider">CSV TCAD Data Auto-Extractor</label>
                        <div id="dropZone" class="border border-dashed border-white/10 rounded-xl p-3 hover:border-blue-500/50 transition-colors relative bg-slate-900/30 cursor-pointer">
                            <input type="file" id="csvFile" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" />
                            <div class="text-center pointer-events-none z-10 text-xs text-slate-400">Drop <b>Vgs, Ids</b> CSV or <span class="text-blue-400 underline">browse</span></div>
                        </div>
                        <div id="csvResult" class="hidden grid grid-cols-3 gap-2 mt-3 text-center text-[10px] bg-slate-900/60 rounded-lg p-2 border border-white/5">
                            <div><span class="text-slate-500">Ext Vth0</span><br><span id="rVth" class="text-emerald-400 font-mono">--</span> V</div>
                            <div><span class="text-slate-500">Ion/Ioff</span><br><span id="rIonOff" class="text-purple-400 font-mono">--</span></div>
                            <div><span class="text-slate-500">Gm max</span><br><span id="rGm" class="text-blue-400 font-mono">--</span> S</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: Code & Compiler -->
            <div class="xl:col-span-7 flex flex-col gap-4">
                <div class="flex flex-wrap gap-4">
                    <button id="btnFET" class="neon-btn flex-1 min-w-[140px] px-6 py-4 rounded-2xl text-white font-semibold flex justify-center items-center gap-2">
                        <span class="btn-text">⚛️ Compile FET (Thermal TAAM)</span>
                        <div class="spinner"></div>
                    </button>
                    <button id="btnLIF" class="neon-btn flex-1 min-w-[140px] px-6 py-4 rounded-2xl text-white font-semibold flex justify-center items-center gap-2 bg-gradient-to-r from-purple-500 to-pink-500">
                        <span class="btn-text">🧠 Compile LIF Neuron</span>
                        <div class="spinner"></div>
                    </button>
                </div>

                <div class="glass-panel p-0 overflow-hidden flex-grow flex flex-col min-h-[500px]">
                    <div class="flex border-b border-white/5 bg-slate-900/40">
                        <button id="tabCode" class="tab-btn active flex-1 py-3 text-sm font-medium text-blue-400 border-b-2 border-blue-400 bg-slate-800/30">📄 Verilog-A Code</button>
                        <button id="tabGuide" class="tab-btn flex-1 py-3 text-sm font-medium text-slate-400 border-b-2 border-transparent">📘 Cadence Guide</button>
                    </div>

                    <div id="viewCode" class="flex-grow flex flex-col bg-[#0d1117]">
                        <div class="flex justify-end p-3 gap-2 border-b border-white/5 bg-slate-900/20">
                            <button id="copyBtn" class="text-xs bg-white/5 hover:bg-white/10 px-4 py-1.5 rounded-lg text-slate-300">📋 Copy</button>
                            <button id="dlBtn" class="text-xs bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded-lg text-white">⬇️ Download .va</button>
                        </div>
                        <div class="flex-grow overflow-auto p-0"><pre class="h-full m-0 p-5"><code id="codeBlock" class="verilog terminal-code text-slate-300">// Click a Compile button below to generate TCAD-calibrated Verilog-A.</code></pre></div>
                    </div>

                    <div id="viewGuide" class="hidden flex-grow p-6 bg-[#0d1117] text-slate-300 text-sm overflow-y-auto custom-scroll leading-relaxed"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript: Rock-Solid Pure JS Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. Initialize Highlight.js
            hljs.highlightAll();

            // 2. Get DOM Elements
            const els = { 
                L:document.getElementById('pL'), W:document.getElementById('pW'), N:document.getElementById('pN'), D:document.getElementById('pDop'), 
                Vth:document.getElementById('pVth'), Dibl:document.getElementById('pDibl'), U0:document.getElementById('pU0'), 
                Vsat:document.getElementById('pVsat'), Clm:document.getElementById('pClm'), Swing:document.getElementById('pSwing'), 
                Rs:document.getElementById('pRs'), Rd:document.getElementById('pRd'), 
                btnF:document.getElementById('btnFET'), btnL:document.getElementById('btnLIF'), 
                code:document.getElementById('codeBlock'), copy:document.getElementById('copyBtn'), dl:document.getElementById('dlBtn'),
                vC:document.getElementById('viewCode'), vG:document.getElementById('viewGuide'), tabG:document.getElementById('tabGuide'),
                tabC:document.getElementById('tabCode'),
                csv:document.getElementById('csvFile'), csvRes:document.getElementById('csvResult'), drop:document.getElementById('dropZone'),
                rVth:document.getElementById('rVth'), rIonOff:document.getElementById('rIonOff'), rGm:document.getElementById('rGm')
            };
            let curCode = "";

            const showToast = () => { 
                const t = document.getElementById('toast'); 
                t.classList.add('show'); 
                setTimeout(()=>t.classList.remove('show'), 2500); 
            };

            // 3. CSV Parser
            els.csv.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if(!file) {
                    alert("Please select a valid CSV file.");
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const text = ev.target.result;
                        const lines = text.split('\n').filter(l => l.trim() !== '');
                        if(lines.length < 2) return alert("CSV file seems empty. Please include Vgs and Ids columns.");
                        
                        let vgs=[], ids=[];
                        const header = lines[0].split(',').map(h=>h.trim().toLowerCase());
                        // Try to auto-detect columns
                        let vgsIdx = header.findIndex(h => h.includes('vgs') || h.includes('gate'));
                        let idsIdx = header.findIndex(h => h.includes('ids') || h.includes('drain'));
                        // Fallback to standard 1st and 2nd column if headers missing
                        if(vgsIdx === -1) vgsIdx = 0;
                        if(idsIdx === -1) idsIdx = 1;

                        for(let i=1; i<lines.length; i++) {
                            const cols = lines[i].split(',').map(Number);
                            if(cols.length > Math.max(vgsIdx, idsIdx)) {
                                vgs.push(cols[vgsIdx]);
                                ids.push(Math.abs(cols[idsIdx]));
                            }
                        }
                        
                        if(vgs.length < 5) return alert("Not enough data points. Please ensure columns represent Vgs and Ids.");

                        // Algorithm to extract Vth (Max transconductance method)
                        let gmMax = 0, vthIdx = 0;
                        for(let i=1; i<vgs.length-1; i++) {
                            const gm = (ids[i+1]-ids[i-1]) / (vgs[i+1]-vgs[i-1]);
                            if(gm > gmMax) {
                                gmMax = gm;
                                vthIdx = i;
                            }
                        }
                        // Intersect tangent line with X-axis (Vgs axis)
                        const vth = vgs[vthIdx] - ids[vthIdx] / gmMax;
                        const ion = Math.max(...ids);
                        const ioff = ids[0] < ids[ids.length-1] ? ids[0] : ids[ids.length-1];

                        // Update UI
                        els.rVth.textContent = vth.toFixed(3);
                        els.rIonOff.textContent = (ion/ioff).toExponential(2);
                        els.rGm.textContent = gmMax.toExponential(2);
                        els.csvRes.classList.remove('hidden');
                        els.drop.classList.add('upload-success');
                        els.Vth.value = vth.toFixed(3); // Auto-fill base Vth
                    } catch(err) {
                        alert("Error parsing file. Make sure it's a clean CSV with numeric Vgs and Ids columns.");
                        console.error(err);
                    }
                };
                reader.readAsText(file);
            });

            // 4. Verilog-A Generators
            function genFET() {
                // Get 12 standard parameters
                const L = parseFloat(els.L.value), W = parseFloat(els.W.value), N = parseInt(els.N.value);
                const dop = els.D.value, vth = parseFloat(els.Vth.value);
                const dibl = parseFloat(els.Dibl.value), u0 = parseFloat(els.U0.value), vsat = els.Vsat.value;
                const clm = parseFloat(els.Clm.value), swing = parseFloat(els.Swing.value);
                const rs = parseFloat(els.Rs.value), rd = parseFloat(els.Rd.value);
                
                // Safe Thermal Parameters
                const rthInput = document.getElementById('pRth');
                const tambInput = document.getElementById('pTamb');
                const rth = rthInput ? parseFloat(rthInput.value) : 80;
                const tamb = tambInput ? parseFloat(tambInput.value) : 300;
                const kt = -0.002; // Temperature coefficient (V/K)

                curCode = `//====================================================================
// FET2SNN: TAAM Thermal-Aware Nanosheet GAA-FET
//====================================================================
\`include "disciplines.vams"
\`include "constants.vams"

module nanosheet_fet(D, G, S);
    // GEOMETRIES
    parameter real L_g = ${L}E-9;
    parameter real W_sheet = ${W}E-9;
    parameter integer N_sheets = ${N};
    parameter real N_ch = ${dop};
    
    // PHYSICAL PARAMETERS
    parameter real Vth0 = ${vth};
    parameter real dibl = ${dibl};
    parameter real u0 = ${u0};
    parameter real vsat = ${vsat};
    parameter real clm = ${clm};
    parameter real sub_swing = ${swing};
    parameter real rs = ${rs};
    parameter real rd = ${rd};
    
    // THERMAL PARAMETERS (TAAM)
    parameter real Rth = ${rth};
    parameter real T_amb = ${tamb};
    parameter real kt = ${kt};
    
    electrical D, G, S;
    real Weff, Ids, Vgs, Vds, Vth_eff, Vdsat, mu_eff, Vds_int, Vgs_int;
    real P_diss, T_junc, Vth_thermal;
    
    analog begin
        Weff = W_sheet * N_sheets;
        Vds_int = V(D) - V(S) - Ids * (rs + rd);
        Vgs_int = V(G) - V(S) - Ids * rs;
        
        // SELF-HEATING CALCULATION
        P_diss = Ids * Vds_int;
        T_junc = T_amb + (P_diss * Rth);
        
        // THERMALLY ADJUSTED Vth
        Vth_thermal = Vth0 + (kt * (T_junc - T_amb));
        Vth_eff = Vth_thermal - dibl * Vds_int;
        
        mu_eff = u0 / (1 + u0 * Vds_int / (vsat * L_g * 1E2));
        
        if (Vgs_int > Vth_eff) begin
            Vdsat = (Vgs_int - Vth_eff) * vsat * L_g * 1E2 / ((Vgs_int - Vth_eff) + vsat * L_g * 1E2);
            if (Vds_int < Vdsat) 
                Ids = mu_eff * (Weff/L_g) * 1E-6 * ((Vgs_int - Vth_eff)*Vds_int - 0.5*Vds_int*Vds_int) * (1 + clm*Vds_int);
            else 
                Ids = 0.5 * mu_eff * (Weff/L_g) * 1E-6 * Vdsat*Vdsat * (1 + clm*Vds_int);
        end else 
            Ids = 1E-12 * exp((Vgs_int - Vth_eff) / sub_swing);
        
        I(D, S) <+ Ids;
    end
endmodule`;
                updateUI();
            }

            function genLIF() {
                curCode = `//====================================================================
// FET2SNN: Leaky Integrate-and-Fire (LIF) Neuron
//====================================================================
\`include "disciplines.vams"
\`include "constants.vams"

module lif_neuron(V_in, V_out, V_th, V_reset);
    parameter real R_m = 10e6;
    parameter real C_m = 50e-15;
    parameter real V_thresh = 0.7;
    parameter real V_rest = 0.0;
    parameter real V_spike = 1.0;
    parameter real t_ref = 1e-9;
    
    electrical V_in, V_out, V_th, V_reset;
    real V_mem, I_in, t_last_spike;
    integer spiked;
    
    analog begin
        @(initial_step) begin V_mem = V_rest; t_last_spike = 0; spiked = 0; end
        
        real ext_th = V(V_th); real ext_rst = V(V_reset);
        if (ext_th > 0.1) V_thresh = ext_th;
        if (ext_rst > 0.1) V_mem = V_rest;
        
        I_in = (V(V_in) - V_mem) / R_m;
        V_mem = V_mem + (I_in * $abstime - (V_mem - V_rest)/ (R_m * C_m) * $abstime);
        
        // Fire & Refractory Logic
        if (V_mem >= V_thresh && spiked == 0 && ($abstime - t_last_spike) > t_ref) begin
            V_mem = V_spike; spiked = 1; t_last_spike = $abstime;
        end else if (spiked == 1 && ($abstime - t_last_spike) < (t_ref + 1e-10)) begin
            V_mem = V_rest;
        end else begin spiked = 0; end
        
        V(V_out) <+ transition(V_mem, 0, 1e-12);
    end
endmodule`;
                updateUI();
            }

            // 5. UI Update Helper
            function updateUI() {
                // Switch to Code Tab
                els.vC.classList.remove('hidden'); els.vG.classList.add('hidden');
                document.querySelectorAll('.tab-btn').forEach(b => { 
                    b.classList.remove('active','border-blue-400','text-blue-400','bg-slate-800/30'); 
                    b.classList.add('border-transparent','text-slate-400'); 
                });
                if (els.tabC) {
                    els.tabC.classList.add('active','border-blue-400','text-blue-400','bg-slate-800/30');
                } else {
                    const firstTab = document.querySelector('.tab-btn');
                    if (firstTab) firstTab.classList.add('active','border-blue-400','text-blue-400','bg-slate-800/30');
                }
                
                // Update Text & Highlight
                els.code.textContent = curCode;
                hljs.highlightElement(els.code);
                showToast();
            }

            // 6. Button Actions
            function runGen(fn, btn) {
                btn.classList.add('loading');
                setTimeout(() => { 
                    fn(); 
                    btn.classList.remove('loading'); 
                }, 400); 
            }

            els.btnF.addEventListener('click', function() { runGen(genFET, this); });
            els.btnL.addEventListener('click', function() { runGen(genLIF, this); });

            // Copy & Download
            els.copy.addEventListener('click', () => {
                if(!curCode) return alert("Please generate a model first!");
                navigator.clipboard.writeText(curCode).then(() => { 
                    els.copy.textContent = "✅ Copied!"; 
                    setTimeout(()=>els.copy.textContent="📋 Copy",2000); 
                }).catch(()=>alert("Manual copy: Highlight code, right-click, and copy."));
            });
            els.dl.addEventListener('click', () => {
                if(!curCode) return alert("Please generate a model first!");
                const blob = new Blob([curCode], {type:"text/plain"}); 
                const url = URL.createObjectURL(blob); 
                const a = document.createElement('a'); 
                a.href=url; a.download="nanosheet_fet_taam.va"; 
                a.click(); 
                URL.revokeObjectURL(url);
            });

            // 7. Cadence Guide & Tab Switchers
            if (els.tabC) {
                els.tabC.addEventListener('click', () => {
                    els.vC.classList.remove('hidden'); els.vG.classList.add('hidden');
                    document.querySelectorAll('.tab-btn').forEach(b => { 
                        b.classList.remove('active','border-blue-400','text-blue-400','bg-slate-800/30'); 
                        b.classList.add('border-transparent','text-slate-400'); 
                    });
                    els.tabC.classList.add('active','border-blue-400','text-blue-400','bg-slate-800/30');
                });
            }

            els.tabG.addEventListener('click', () => {
                els.vC.classList.add('hidden'); els.vG.classList.remove('hidden');
                document.querySelectorAll('.tab-btn').forEach(b => { 
                    b.classList.remove('active','border-blue-400','text-blue-400','bg-slate-800/30'); 
                    b.classList.add('border-transparent','text-slate-400'); 
                });
                els.tabG.classList.add('active','border-blue-400','text-blue-400','bg-slate-800/30');
                els.vG.innerHTML = `
