<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FET2SNN · Reset Password</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a1628;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #f0f4f8;
        }
        .card {
            background: rgba(15,30,55,0.9);
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 20px;
            padding: 48px 40px;
            width: 420px;
            box-shadow: 0 0 60px rgba(0,212,255,0.08);
            backdrop-filter: blur(20px);
        }
        .logo { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
        .logo .accent { color: #00d4ff; }
        .title { font-size: 20px; font-weight: 700; margin: 24px 0 8px; }
        .sub { color: rgba(240,244,248,0.45); font-size: 13px; margin-bottom: 28px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        label { font-size: 11px; font-weight: 600; color: rgba(240,244,248,0.4); text-transform: uppercase; letter-spacing: 0.08em; }
        .input-wrap {
            display: flex; align-items: center;
            background: rgba(240,244,248,0.03);
            border: 1px solid rgba(240,244,248,0.08);
            border-radius: 10px;
            transition: all 0.2s ease;
        }
        .input-wrap:focus-within { border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.03); }
        .input-wrap input {
            flex: 1; padding: 12px 14px;
            background: transparent; border: none; color: #f0f4f8;
            font-family: 'Inter', sans-serif; font-size: 14px; outline: none;
        }
        .btn {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #00d4ff, #0ea5e9);
            border: none; border-radius: 10px;
            color: #0a1628; font-weight: 700; font-size: 15px;
            cursor: pointer; margin-top: 8px;
            transition: all 0.2s ease;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .msg { font-size: 13px; margin-top: 16px; padding: 12px; border-radius: 8px; text-align: center; }
        .msg.success { background: rgba(0,255,128,0.08); border: 1px solid rgba(0,255,128,0.2); color: #4ade80; }
        .msg.error { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); color: #f87171; }
        .back-link { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(240,244,248,0.4); }
        .back-link a { color: #00d4ff; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">FET2<span class="accent">SNN</span></div>
        <div class="title">🔐 Set New Password</div>
        <div class="sub">Enter your new password below to complete the reset.</div>

        <div id="invalidTokenMsg" class="msg error" style="display:none;">
            ❌ This reset link is invalid or has expired. Please request a new one.
        </div>

        <form id="resetForm" style="display:none;" onsubmit="handleReset(event)">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="input-wrap">
                    <input type="password" id="newPassword" placeholder="At least 6 characters" required minlength="6" />
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrap">
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required />
                </div>
            </div>
            <button type="submit" class="btn" id="submitBtn">Reset Password →</button>
        </form>

        <div id="resultMsg" class="msg" style="display:none;"></div>

        <div class="back-link">
            <a href="/login">← Back to Login</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        window.addEventListener('DOMContentLoaded', () => {
            if (!token) {
                document.getElementById('invalidTokenMsg').style.display = 'block';
            } else {
                document.getElementById('resetForm').style.display = 'block';
            }
        });

        async function handleReset(event) {
            event.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');
            const resultMsg = document.getElementById('resultMsg');

            resultMsg.style.display = 'none';

            if (newPassword !== confirmPassword) {
                resultMsg.className = 'msg error';
                resultMsg.textContent = '❌ Passwords do not match!';
                resultMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const resp = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password: newPassword })
                });
                const data = await resp.json();

                resultMsg.className = 'msg ' + (data.status === 'success' ? 'success' : 'error');
                resultMsg.textContent = (data.status === 'success' ? '✅ ' : '❌ ') + data.message;
                resultMsg.style.display = 'block';

                if (data.status === 'success') {
                    document.getElementById('resetForm').style.display = 'none';
                    setTimeout(() => { window.location.href = '/login'; }, 2500);
                }
            } catch (err) {
                resultMsg.className = 'msg error';
                resultMsg.textContent = '❌ Network error. Please try again.';
                resultMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password →';
            }
        }
    </script>
</body>
</html>
